spring.application.name=libreria

# configuracion de conexion hacia BD
spring.datasource.url=jdbc:mysql://localhost:3306/db?useSSL=false&servertimezone=UTC
spring.datasource.usarname=root
spring.datasource.password=root

# esquema
spring.jpa.hibernate.ddl-auto=update

#Dialecto de mysql
spring.jpa.database.plataform=org.hibernate.dialect.MySQLDialect

#mostrar por consola
spring.jpa.show-sql=true
spring.jpa.propieties.hibernate.format_sql=true

#driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver